name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Lint with ruff
        run: poetry run ruff check app/ tests/

      - name: Run tests with coverage
        env:
          SECRET_KEY: testsecret
          ALGORITHM: HS256
          ADMIN_PASSWORD: testpassword
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          ENVIRONMENT: test
          MEDIA_PATH: /tmp/test_media
        run: poetry run pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing

  frontend-lint-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t jroots-backend .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t jroots-frontend .

  e2e:
    runs-on: ubuntu-latest
    needs: [docker-build]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        working-directory: e2e
        run: npm ci && npx playwright install --with-deps chromium

      - name: Build images and start services
        run: |
          docker build -f backend/Dockerfile -t jroots-backend .
          docker build -f frontend/Dockerfile -t jroots-frontend .
          docker compose -f docker-compose.ci.yml up -d

      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:80/api/health && exit 0
            sleep 2
          done
          docker compose -f docker-compose.ci.yml logs
          exit 1

      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test
        env:
          BASE_URL: http://localhost:80

      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: e2e/test-results/

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.ci.yml down
