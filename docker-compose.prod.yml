version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env.prod
    volumes:
      - media:/app/media
    networks:
      - coolify
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file: .env.prod
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - coolify
    restart: unless-stopped

networks:
  coolify:

volumes:
  media:
