services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 4 --bind 0.0.0.0:8000
    env_file: .env.prod
    volumes:
      - media:/app/media
    networks:
      - coolify
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        CDN_BASE: https://jroots.b-cdn.net/
    env_file: .env.prod
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - coolify
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

networks:
  coolify:
    external: true

volumes:
  media:
