repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff lint
        entry: .venv/bin/ruff check
        language: system
        types: [python]
        args: [backend/app/, backend/tests/]
        pass_filenames: false

      - id: pytest-backend
        name: Run backend tests with pytest
        entry: ./run-tests.sh
        language: system
        types: [python]
        pass_filenames: false
